# ==========================================================
# 新荘音頭 正本メタデータ
# Shinso Ondo Canonical Metadata
#
# このファイルは、新荘音頭デジタルアーカイブにおける
# 内部メタデータの正本（Canonical Metadata）である。
#
# 作品・表現形・体現形・個別ファイル、制作者、演奏者、
# 権利、典拠等を一つの内部モデルとして管理し、
# HTML、Schema.org JSON-LD、README等の各形式へ変換する。
#
# Metadata Model Version: 2.0.0
# Updated: 2026-07-23
#
# Design principle:
#   One Source, Multi Use
# ==========================================================

metadata_model:
  name:
    ja: "新荘音頭 正本メタデータ"
    en: "Shinso Ondo Canonical Metadata"

  version: "2.0.0"
  status: stable
  updated: "2026-07-23"

  canonical: true

  purpose:
    ja: >-
      新荘音頭デジタルアーカイブにおける作品、歌詞、演奏、
      録音、公開ファイル、制作者、権利および典拠を、
      表示形式や外部メタデータ語彙から独立した内部モデルとして管理する。
    en: >-
      To manage the work, lyrics, performances, recordings, published files,
      contributors, rights, and sources of the Shinso Ondo Digital Archive
      as an internal model independent of presentation formats and external
      metadata vocabularies.

  description:
    ja: >-
      このYAMLを正本とし、人間向けのWebページと、
      機械可読なSchema.org JSON-LD等を同一データから生成する。
      将来、新たな表示形式やメタデータ語彙へ対応する場合も、
      正本の構造を保持したままクロスウォークを追加する。
    en: >-
      This YAML serves as the canonical source from which both human-readable
      web pages and machine-readable outputs such as Schema.org JSON-LD are
      generated. Future presentation formats and metadata vocabularies can be
      supported by adding crosswalks while retaining the canonical structure.

  default_language: ja

  supported_languages:
    - ja
    - en

  versioning_policy:
    scheme: semantic_versioning
    description:
      ja: >-
        メタデータモデルの互換性に影響する変更はメジャー版、
        後方互換性を保った項目追加はマイナー版、
        誤記訂正や値の修正はパッチ版として管理する。
      en: >-
        Changes affecting metadata-model compatibility increment the major
        version; backward-compatible additions increment the minor version;
        corrections and value updates increment the patch version.

