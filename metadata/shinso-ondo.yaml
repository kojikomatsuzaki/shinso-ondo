  canonical_metadata_path: "metadata/shinso-ondo.yaml"

design_principles:
  - id: one_source_multi_use
    name:
      ja: "一つの正本から複数の用途へ"
      en: "One Source, Multi Use"
    description:
      ja: >-
        作品情報を複数のファイルへ重複して記述せず、
        一つの正本メタデータからWebページ、構造化データ、
        README等を生成する。
      en: >-
        Avoid duplicating descriptive data across files and generate web pages,
        structured data, README files, and other outputs from one canonical source.

  - id: canonical_metadata
    name:
      ja: "正本メタデータ"
      en: "Canonical Metadata"
    description:
      ja: >-
        このYAMLを情報更新の基準とし、派生する表示や外部形式は
        正本から生成された表現として扱う。
      en: >-
        Treat this YAML as the authoritative source for updates and regard
        derived displays and external formats as generated representations.

  - id: separation_of_model_and_presentation
    name:
      ja: "内部モデルと表示の分離"
      en: "Separation of Model and Presentation"
    description:
      ja: >-
        HTMLの見た目や特定サービスの仕様を内部メタデータへ直接持ち込まず、
        データ構造と表示処理を分離する。
      en: >-
        Keep presentation details and platform-specific requirements out of
        the internal metadata model by separating data structure from rendering.

  - id: human_and_machine_readability
    name:
      ja: "人間可読性と機械可読性の両立"
      en: "Human and Machine Readability"
    description:
      ja: >-
        地域住民や一般利用者が理解しやすい表示と、
        検索エンジンや外部システムが処理できる構造化データを
        同じ正本から提供する。
      en: >-
        Provide both accessible human-readable displays and structured data
        processable by search engines and external systems from the same source.

  - id: crosswalk_oriented_architecture
    name:
      ja: "クロスウォーク指向"
      en: "Crosswalk-Oriented Architecture"
    description:
      ja: >-
        内部モデルの項目を外部語彙へ直接置き換えるのではなく、
        対応関係を定義するクロスウォーク層を介して変換する。
      en: >-
        Transform the internal model through explicit crosswalk mappings rather
        than replacing internal fields with terms from an external vocabulary.

  - id: standards_independence
    name:
      ja: "外部規格からの独立性"
      en: "Independence from External Standards"
    description:
      ja: >-
        Schema.org等の外部規格が改訂された場合でも、
        内部モデルを維持し、クロスウォーク側の更新で対応できる構造とする。
      en: >-
        Preserve the internal model when external standards change and adapt
        by updating the crosswalk layer.

  - id: extensibility
    name:
      ja: "段階的拡張"
      en: "Incremental Extensibility"
    description:
      ja: >-
        音源、楽譜、歌詞、画像、映像等の追加や、
        新たな外部形式への対応を段階的に行える構造とする。
      en: >-
        Support incremental addition of audio, scores, lyrics, images, video,
        and mappings to further external formats.

  - id: provenance_and_rights
    name:
      ja: "典拠と権利情報の明示"
      en: "Explicit Provenance and Rights"
    description:
      ja: >-
        記述内容の典拠、権利者、許諾範囲、ライセンスを記録し、
        公開と再利用の根拠を確認できるようにする。
      en: >-
        Record sources, rights holders, permission scope, and licenses so that
        the basis for publication and reuse remains verifiable.

  - id: preservation_and_access
    name:
      ja: "保存用データと利用用データの区別"
      en: "Distinction Between Preservation and Access"
    description:
      ja: >-
        保存用マスターと閲覧・配信用コピーを役割によって区別し、
        長期保存と利用の双方に対応する。
      en: >-
        Distinguish preservation masters from access copies by role to support
        both long-term preservation and public use.

  - id: open_and_reusable_infrastructure
    name:
      ja: "開かれた再利用可能な基盤"
      en: "Open and Reusable Infrastructure"
    description:
      ja: >-
        広く利用可能なオープンな基盤と可読なファイル形式を組み合わせ、
        特定機関や専用システムだけに依存しない継続的な運用を目指す。
      en: >-
        Combine broadly available open infrastructure with readable file formats
        to support sustainable operation without dependence on a single
        institution or proprietary archive system.

