expression:
  lyrics_structure:
    total_verses: 7
    interlude:
      after_verse: 4
      measures: 4

  variants:
    - name: "確定版"
      verses: [1, 2, 3, 4, 5, 6, 7]
      note: "2026年7月26日付パンフレット掲載歌詞"

  verses:
    - number: 1
      lyricist: "川又 一郎"
      text: |-
        水戸の歴史に　ふれる新屋敷
        十の小径を　歩いてみれば
        かえでの子たちの　笑い声
        今日も元気だ　この街は
      kana: |-
        みとのれきしに　ふれるしんやしき
        とおのこみちを　あるいてみれば
        かえでのこたちの　わらいごえ
        きょうもげんきだ　このまちは
      note: null

    - number: 2
      lyricist: "川又 一郎"
      text: |-
        初夏をいろどる　あじさいの保和苑
        しぼりの浴衣が　よく似合う
        そぞろ歩きで　風感じ
        みなもにうつる　青あじさい
      kana: |-
        しょかをいろどる　あじさいのほわえん
        しぼりのゆかたが　よくにあう
        そぞろあるきで　かぜかんじ
        みなもにうつる　あおあじさい
      note: null

    - number: 3
      lyricist: "小網 昇"
      text: |-
        水戸で名高い　銀杏の名所
        道をたどれば　歴史館
        学ぶ心を　いつまでも
        もって歩けば　あふれる笑顔
      kana: |-
        みとでなだかい　いちょうのめいしょ
        みちをたどれば　れきしかん
        まなぶこころを　いつまでも
        もってあるけば　あふれるえがお
      note: null

    - number: 4
      lyricist: "椹沢 庸平"
      text: |-
        道にあふれる　あじさいの花
        シンボルツリーが　のぞみるは
        昔呼ばれた　馬口労町
        今は末広　あじさい通り
      kana: |-
        みちにあふれる　あじさいのはな
        シンボルツリーが　のぞみるは
        むかしよばれた　ばくろちょう
        いまはすえひろ　あじさいどおり
      note: >-
        第2行はパンフレットの表記をそのまま転記。
        「馬口労町」は行政上の読み「ばくろうちょう」ではなく、
        歌詞では地域で実際に用いられていた発音「ばくろちょう」を採用。

    - number: 5
      lyricist: "川又 一郎"
      text: |-
        路面電車の　跡道を
        昔を偲んで　歩いてみれば
        あのとき乗った　車内のにおい
        窓辺に見える　新荘小
      kana: |-
        ろめんでんしゃの　あとみちを
        むかしをしのんで　あるいてみれば
        あのときのった　しゃないのにおい
        まどべにみえる　しんそうしょう
      note: null

    - number: 6
      lyricist: "小網 昇"
      text: |-
        急な坂道　登っていけば
        いつか来た道　七曲坂
        上がればながめ　広がるよ
        一歩一歩を　大切に
      kana: |-
        きゅうなさかみち　のぼっていけば
        いつかきたみち　ななまがり
        あがればながめ　ひろがるよ
        いっぽいっぽを　たいせつに
      note: >-
        「七曲坂」の読みは、歌詞およびパンフレットのルビに基づき
        「ななまがり」とする。

    - number: 7
      lyricist: "小網 昇"
      text: |-
        三味の音色に　浮かれ出て
        そぞろ歩きの　大工町
        集う所は　いつものところ
        あ～あ人生は　楽しいな
      kana: |-
        しゃみのねいろに　うかれでて
        そぞろあるきの　だいくまち
        つどうところは　いつものところ
        あーあじんせいは　たのしいな
      note: null

