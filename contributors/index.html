<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="新荘音頭の制作、作詞、作曲、編曲、振付、歌唱、演奏、録音、音楽編集、パンフレット制作およびデジタルアーカイブに関わった人々を紹介します。"
    >

    <title>制作・協力者 | 新荘音頭デジタルアーカイブ</title>

    <link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
    <h1>制作・協力者</h1>
    <p lang="en">Contributors</p>
</header>

<main>

    <p id="loading-message" role="status">
        制作・協力者情報を読み込んでいます。
    </p>

    <div id="contributors-content" hidden>

        <section>
            <h2>制作・企画</h2>
            <div id="planning-list"></div>
        </section>

        <section>
            <h2>作詞・作曲・編曲</h2>
            <div id="music-creation-list"></div>
        </section>

        <section>
            <h2>振付</h2>
            <div id="choreography-list"></div>
        </section>

        <section>
            <h2>歌唱・演奏</h2>
            <div id="performance-list"></div>
        </section>

        <section>
            <h2>録音・音楽編集</h2>
            <div id="audio-production-list"></div>
        </section>

        <section>
            <h2>パンフレット制作</h2>
            <div id="pamphlet-list"></div>
        </section>

        <section>
            <h2>デジタルアーカイブ</h2>
            <div id="archive-list"></div>
        </section>

    </div>

    <div id="error-message" role="alert" hidden>
        <h2>情報を表示できませんでした</h2>

        <p>
            メタデータの読み込みまたは解析に失敗しました。
            ページを再読み込みしてください。
        </p>

        <p>
            <a href="../metadata/shinso-ondo.yaml">
                メタデータを直接確認する
            </a>
        </p>
    </div>

</main>

<footer>
    <hr>

    <p>
        <a href="../index.html">トップページへ戻る</a>
    </p>

    <p lang="en">
        © Shinso Ondo Production Committee
    </p>
</footer>

<script src="../js/js-yaml.min.js"></script>

<script>
    "use strict";

    const YAML_PATH = "../metadata/shinso-ondo.yaml";

    /*
     * YAMLで使用している役割名を、
     * Webページに表示する日本語へ変換する。
     */
    const ROLE_LABELS = {
        lyricist: "作詞",
        composer: "作曲",
        arranger: "編曲",
        choreographer: "振付",
        musician: "演奏",
        singer: "歌唱",
        conductor: "指揮",
        project_director: "総監修",
        originator: "発案",
        recording_engineer: "音楽録音",
        audio_editor: "音楽編集",
        pamphlet_producer: "パンフレット制作",
        archive_manager: "デジタルアーカイブ管理"
    };

    /*
     * roleの表示名とnoteが同じ場合は、
     * 同じ語を重ねて表示しない。
     *
     * 例：
     * role: choreographer
     * note: 振付
     *
     * 表示：
     * ・振付
     */
    function isRedundantNote(role, note) {
        if (!note) {
            return true;
        }

        const roleLabel =
            ROLE_LABELS[role]
            || role
            || "";

        return note.trim() === roleLabel.trim();
    }

    /*
     * 同一人物の複数レコードを、
     * Webページ上では一人分のデータにまとめる。
     *
     * YAMLでは役割ごとにレコードを分けて保持し、
     * 表示時に人物単位へ再構成する。
     */
    function groupContributorsByPerson(contributors) {
        const people = new Map();

        contributors.forEach((contributor) => {
            const name =
                contributor.name
                || "名称未記録";

            const englishName =
                contributor.name_en
                || "";

            /*
             * 日本語名と英語名の組み合わせを
             * 同一人物を判定するためのキーにする。
             */
            const personKey =
                `${name}|${englishName}`;

            if (!people.has(personKey)) {
                people.set(personKey, {
                    name: name,
                    name_en: englishName,
                    contributions: []
                });
            }

            const person =
                people.get(personKey);

            const role =
                contributor.role
                || "";

            const note =
                contributor.note
                || "";

            /*
             * 同じ人物について、
             * 同一の役割と注記が複数の音源に現れる場合は、
             * 一度だけ表示する。
             */
            const contributionKey =
                `${role}|${note}`;

            const alreadyExists =
                person.contributions.some(
                    (contribution) =>
                        contribution.key === contributionKey
                );

            if (!alreadyExists) {
                person.contributions.push({
                    key: contributionKey,
                    role: role,
                    note: note
                });
            }
        });

        return Array.from(people.values());
    }

    /*
     * 一人分の制作者・協力者情報を
     * article要素として生成する。
     */
    function createContributorElement(person) {
        const article =
            document.createElement("article");

        article.className = "contributor";

        const heading =
            document.createElement("h3");

        heading.textContent = person.name;
        article.appendChild(heading);

        if (person.name_en) {
            const englishName =
                document.createElement("p");

            englishName.className =
                "contributor-name-en";

            englishName.lang = "en";
            englishName.textContent =
                person.name_en;

            article.appendChild(englishName);
        }

        const roleList =
            document.createElement("ul");

        roleList.className =
            "contributor-roles";

        person.contributions.forEach(
            (contribution) => {
                const listItem =
                    document.createElement("li");

                const roleLabel =
                    ROLE_LABELS[contribution.role]
                    || contribution.role
                    || "役割未記録";

                listItem.textContent =
                    roleLabel;

                if (
                    contribution.note
                    && !isRedundantNote(
                        contribution.role,
                        contribution.note
                    )
                ) {
                    listItem.append(
                        document.createTextNode(
                            ` — ${contribution.note}`
                        )
                    );
                }

                roleList.appendChild(listItem);
            }
        );

        article.appendChild(roleList);

        return article;
    }

    /*
     * 指定されたセクションへ
     * 制作者・協力者を追加する。
     */
    function appendContributors(
        containerId,
        contributors
    ) {
        const container =
            document.getElementById(containerId);

        /*
         * 再実行された場合に備えて、
         * 既存の表示をいったん空にする。
         */
        container.replaceChildren();

        if (
            !Array.isArray(contributors)
            || contributors.length === 0
        ) {
            const emptyMessage =
                document.createElement("p");

            emptyMessage.textContent =
                "該当する情報は現在登録されていません。";

            container.appendChild(emptyMessage);
            return;
        }

        const groupedContributors =
            groupContributorsByPerson(contributors);

        groupedContributors.forEach((person) => {
            const contributorElement =
                createContributorElement(person);

            container.appendChild(
                contributorElement
            );
        });
    }

    /*
     * 各音源のperformersとmanifestation.creditsから、
     * 歌唱、演奏、指揮、録音などの情報を収集する。
     */
    function collectPerformanceContributors(
        performances
    ) {
        const contributors = [];

        performances.forEach((performance) => {
            if (
                Array.isArray(
                    performance.performers
                )
            ) {
                contributors.push(
                    ...performance.performers
                );
            }

            const manifestation =
                performance.manifestation
                || {};

            const credits =
                Array.isArray(
                    manifestation.credits
                )
                    ? manifestation.credits
                    : [];

            contributors.push(...credits);
        });

        return contributors;
    }

    /*
     * 指定した役割に該当するレコードだけを取り出す。
     */
    function byRoles(contributors, roles) {
        return contributors.filter(
            (contributor) =>
                roles.includes(contributor.role)
        );
    }

    /*
     * YAMLを読み込み、
     * 各セクションの表示を生成する。
     */
    async function loadContributors() {
        const loadingMessage =
            document.getElementById(
                "loading-message"
            );

        const contributorsContent =
            document.getElementById(
                "contributors-content"
            );

        const errorMessage =
            document.getElementById(
                "error-message"
            );

        try {
            if (typeof jsyaml === "undefined") {
                throw new Error(
                    "js-yamlライブラリを読み込めませんでした。"
                );
            }

            const response =
                await fetch(YAML_PATH, {
                    cache: "no-cache"
                });

            if (!response.ok) {
                throw new Error(
                    `YAMLの取得に失敗しました: ${response.status}`
                );
            }

            const yamlText =
                await response.text();

            const metadata =
                jsyaml.load(yamlText);

            const workContributors =
                metadata
                && metadata.work
                && Array.isArray(
                    metadata.work.contributors
                )
                    ? metadata.work.contributors
                    : [];

            const performances =
                metadata
                && Array.isArray(
                    metadata.performances
                )
                    ? metadata.performances
                    : [];

            const performanceContributors =
                collectPerformanceContributors(
                    performances
                );

            /*
             * 制作・企画
             *
             * YAMLに記録された順序を保つため、
             * 総監修、発案の順で表示される。
             */
            appendContributors(
                "planning-list",
                byRoles(
                    workContributors,
                    [
                        "project_director",
                        "originator"
                    ]
                )
            );

            /*
             * 作詞・作曲・編曲
             */
            appendContributors(
                "music-creation-list",
                byRoles(
                    workContributors,
                    [
                        "lyricist",
                        "composer",
                        "arranger"
                    ]
                )
            );

            /*
             * 振付
             */
            appendContributors(
                "choreography-list",
                byRoles(
                    workContributors,
                    [
                        "choreographer"
                    ]
                )
            );

            /*
             * 歌唱・演奏・指揮
             */
            appendContributors(
                "performance-list",
                byRoles(
                    performanceContributors,
                    [
                        "singer",
                        "musician",
                        "conductor"
                    ]
                )
            );

            /*
             * 録音・音楽編集
             */
            appendContributors(
                "audio-production-list",
                byRoles(
                    workContributors,
                    [
                        "recording_engineer",
                        "audio_editor"
                    ]
                )
            );

            /*
             * パンフレット制作
             */
            appendContributors(
                "pamphlet-list",
                byRoles(
                    workContributors,
                    [
                        "pamphlet_producer"
                    ]
                )
            );

            /*
             * デジタルアーカイブ
             */
            appendContributors(
                "archive-list",
                byRoles(
                    workContributors,
                    [
                        "archive_manager"
                    ]
                )
            );

            loadingMessage.hidden = true;
            errorMessage.hidden = true;
            contributorsContent.hidden = false;

        } catch (error) {
            console.error(
                "制作・協力者情報の表示に失敗しました。",
                error
            );

            loadingMessage.hidden = true;
            contributorsContent.hidden = true;
            errorMessage.hidden = false;
        }
    }

    loadContributors();
</script>

</body>
</html>
