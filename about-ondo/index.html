<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        新荘音頭って？ | 新荘音頭デジタルアーカイブ
    </title>

    <link
        rel="stylesheet"
        href="../style.css"
    >
</head>

<body>

<header>
    <h1>新荘音頭って？</h1>
    <p>About Shinso Ondo</p>
</header>

<main id="main-content">

    <!--
        YAMLの読み込みが完了するまで表示するメッセージ
    -->
    <p
        id="loading-message"
        role="status"
    >
        「新荘音頭」の情報を読み込んでいます。
    </p>


    <!--
        YAMLの読み込みに失敗した場合に表示する領域
    -->
    <section
        id="error-message"
        hidden
        aria-live="polite"
    >
        <h2>情報を表示できませんでした</h2>

        <p>
            メタデータの読み込み中に問題が発生しました。
            時間をおいて、もう一度アクセスしてください。
        </p>
    </section>


    <!--
        JavaScriptによって生成される本文
    -->
    <div
        id="about-ondo-content"
        hidden
    >

        <section aria-labelledby="about-heading">
            <h2 id="about-heading">
                新荘音頭について
            </h2>

            <div id="work-overview"></div>
        </section>


        <section aria-labelledby="structure-heading">
            <h2 id="structure-heading">
                歌詞の構成
            </h2>

            <div id="lyrics-structure"></div>
        </section>


        <section aria-labelledby="creators-heading">
            <h2 id="creators-heading">
                作詞・作曲・編曲・振付
            </h2>

            <div id="principal-creators"></div>
        </section>


        <section aria-labelledby="performance-heading">
            <h2 id="performance-heading">
                音楽と歌唱
            </h2>

            <div id="performances"></div>
        </section>


        <section aria-labelledby="publication-heading">
            <h2 id="publication-heading">
                公開と利用
            </h2>

            <div id="publication-and-rights"></div>
        </section>


        <section aria-labelledby="source-heading">
            <h2 id="source-heading">
                情報の典拠
            </h2>

            <div id="source-information"></div>
        </section>

    </div>

</main>

<footer>
    <hr>

    <p>
        <a href="../index.html">
            トップページへ戻る
        </a>
    </p>

    <p>
        © Shinso Ondo Production Committee
    </p>
</footer>


<!--
    YAMLをJavaScriptオブジェクトへ変換するための
    ローカル版 js-yaml
-->
<script src="../js/js-yaml.min.js"></script>

<script>
    "use strict";


    /* ==========================================
       Configuration
    ========================================== */

    const METADATA_URL =
        "../metadata/shinso-ondo.yaml";


    /* ==========================================
       Role labels

       YAMLでは機械可読な統制語彙を使用し、
       Webページでは日本語表示名へ変換する。

       作品、演奏、録音制作で使用する役割を
       一つの対応表で管理する。
    ========================================== */

    const ROLE_LABELS = {
        lyricist: "作詞",
        composer: "作曲",
        arranger: "編曲",
        choreographer: "振付",
        musician: "演奏",
        singer: "歌唱",
        conductor: "指揮",
        recording_engineer: "録音",
        audio_editor: "音楽編集"
    };


    /* ==========================================
       DOM references
    ========================================== */

    const loadingMessage =
        document.getElementById("loading-message");

    const errorMessage =
        document.getElementById("error-message");

    const aboutOndoContent =
        document.getElementById("about-ondo-content");

    const workOverview =
        document.getElementById("work-overview");

    const lyricsStructure =
        document.getElementById("lyrics-structure");

    const principalCreators =
        document.getElementById("principal-creators");

    const performancesContainer =
        document.getElementById("performances");

    const publicationAndRights =
        document.getElementById(
            "publication-and-rights"
        );

    const sourceInformation =
        document.getElementById(
            "source-information"
        );


    /* ==========================================
       General helper functions
    ========================================== */

    /**
     * 値が表示可能な内容を持っているか確認する。
     *
     * null、undefined、空文字列を
     * Webページへ表示しないために使用する。
     */
    function hasValue(value) {
        return (
            value !== null &&
            value !== undefined &&
            value !== ""
        );
    }


    /**
     * 指定された要素名と文字列から
     * 新しいHTML要素を生成する。
     *
     * innerHTMLを使用せず、
     * textContentで文字列を代入することで、
     * YAMLの内容を安全にDOMへ反映する。
     */
    function createTextElement(
        tagName,
        text,
        className = null
    ) {
        const element =
            document.createElement(tagName);

        element.textContent = text;

        if (className) {
            element.className = className;
        }

        return element;
    }


    /**
     * 「日本語名（英語名）」の
     * 表示文字列を生成する。
     */
    function formatBilingualName(person) {
        if (!person) {
            return "";
        }

        if (
            hasValue(person.name) &&
            hasValue(person.name_en)
        ) {
            return (
                `${person.name}` +
                `（${person.name_en}）`
            );
        }

        return (
            person.name ||
            person.name_en ||
            ""
        );
    }


    /**
     * YYYY-MM-DD形式の日付を
     * 日本語の年月日表記へ変換する。
     */
    function formatJapaneseDate(dateString) {
        if (!hasValue(dateString)) {
            return "";
        }

        const dateParts =
            String(dateString).split("-");

        if (dateParts.length !== 3) {
            return String(dateString);
        }

        const [year, month, day] =
            dateParts;

        return (
            `${Number(year)}年` +
            `${Number(month)}月` +
            `${Number(day)}日`
        );
    }


    /**
     * 配列が存在しない場合でも、
     * 常に配列を返す。
     */
    function asArray(value) {
        return Array.isArray(value)
            ? value
            : [];
    }


    /**
     * 役割コードを日本語表示名へ変換する。
     */
    function getRoleLabel(roleCode) {
        if (!hasValue(roleCode)) {
            return "";
        }

        return (
            ROLE_LABELS[roleCode] ||
            roleCode
        );
    }


    /**
     * 人物情報を同一人物ごとにまとめる。
     *
     * 同じ人物が作曲と編曲など
     * 複数の役割を持つ場合でも、
     * 一人分の表示に統合する。
     */
    function groupPeopleByName(contributors) {
        const groupedPeople =
            new Map();

        contributors.forEach(
            (contributor) => {
                if (
                    !hasValue(
                        contributor.name
                    )
                ) {
                    return;
                }

                const personKey = [
                    contributor.name,
                    contributor.name_en || ""
                ].join("::");

                if (
                    !groupedPeople.has(
                        personKey
                    )
                ) {
                    groupedPeople.set(
                        personKey,
                        {
                            name:
                                contributor.name,

                            name_en:
                                contributor.name_en ||
                                "",

                            roles: []
                        }
                    );
                }

                const person =
                    groupedPeople.get(
                        personKey
                    );

                const roleLabel =
                    getRoleLabel(
                        contributor.role
                    );

                let roleDescription =
                    roleLabel;

                if (
                    hasValue(
                        contributor.note
                    ) &&
                    contributor.note !==
                        roleLabel
                ) {
                    roleDescription +=
                        ` — ${contributor.note}`;
                }

                if (
                    !person.roles.includes(
                        roleDescription
                    )
                ) {
                    person.roles.push(
                        roleDescription
                    );
                }
            }
        );

        return Array.from(
            groupedPeople.values()
        );
    }


    /**
     * dl要素へdt・ddの組を追加する。
     */
    function appendDefinition(
        definitionList,
        term,
        description
    ) {
        if (!hasValue(description)) {
            return;
        }

        definitionList.appendChild(
            createTextElement(
                "dt",
                term
            )
        );

        definitionList.appendChild(
            createTextElement(
                "dd",
                description
            )
        );
    }


    /**
     * 人数や件数に応じて、
     * 「1種類」「2種類」のような文字列を生成する。
     */
    function formatCount(
        count,
        counterWord
    ) {
        return `${count}${counterWord}`;
    }


    /* ==========================================
       Work overview
    ========================================== */

    /**
     * 作品の基本情報を生成する。
     */
    function renderWorkOverview(metadata) {
        const work =
            metadata.work || {};

        const title =
            work.title || {};

        const place =
            work.place || {};

        const publication =
            work.publication || {};


        const titleParagraph =
            document.createElement("p");

        const titleStrong =
            createTextElement(
                "strong",
                title.main || "新荘音頭"
            );

        titleParagraph.appendChild(
            titleStrong
        );


        if (hasValue(title.subtitle)) {
            titleParagraph.appendChild(
                document.createTextNode(
                    ` ― ${title.subtitle} ―`
                )
            );
        }

        workOverview.appendChild(
            titleParagraph
        );


        const placeNames = [
            place.prefecture,
            place.city,
            place.district
        ].filter(hasValue);


        if (placeNames.length > 0) {
            const placeText =
                placeNames.join("");

            workOverview.appendChild(
                createTextElement(
                    "p",

                    `「新荘音頭」は、` +
                    `${placeText}を舞台とする` +
                    `地域の音頭です。`
                )
            );
        }


        if (
            hasValue(publication.date) &&
            hasValue(
                publication.publisher
            )
        ) {
            const publicationDate =
                formatJapaneseDate(
                    publication.date
                );

            workOverview.appendChild(
                createTextElement(
                    "p",

                    `${publicationDate}に、` +
                    `${publication.publisher}から` +
                    `公開されました。`
                )
            );
        }


        if (
            hasValue(publication.note)
        ) {
            workOverview.appendChild(
                createTextElement(
                    "p",
                    publication.note
                )
            );
        }
    }


    /* ==========================================
       Lyrics structure
    ========================================== */

    /**
     * 歌詞全体の構成を生成する。
     */
    function renderLyricsStructure(metadata) {
        const expression =
            metadata.expression || {};

        const structure =
            expression.lyrics_structure ||
            {};

        const interlude =
            structure.interlude || {};


        if (
            hasValue(
                structure.total_verses
            )
        ) {
            lyricsStructure.appendChild(
                createTextElement(
                    "p",

                    `歌詞は全` +
                    `${structure.total_verses}` +
                    `番で構成されています。`
                )
            );
        }


        if (
            hasValue(
                interlude.after_verse
            ) &&
            hasValue(
                interlude.measures
            )
        ) {
            lyricsStructure.appendChild(
                createTextElement(
                    "p",

                    `${interlude.after_verse}` +
                    `番の後には、` +
                    `${interlude.measures}` +
                    `小節の間奏が入ります。`
                )
            );
        }


        const verses =
            asArray(
                expression.verses
            );

        const versesWithNotes =
            verses.filter(
                (verse) =>
                    hasValue(verse.note)
            );


        if (
            versesWithNotes.length > 0
        ) {
            const noteHeading =
                createTextElement(
                    "h3",
                    "歌詞の読みと表記"
                );

            const noteList =
                document.createElement(
                    "ul"
                );


            versesWithNotes.forEach(
                (verse) => {
                    const noteItem =
                        createTextElement(
                            "li",

                            `第${verse.number}番：` +
                            `${verse.note}`
                        );

                    noteList.appendChild(
                        noteItem
                    );
                }
            );


            lyricsStructure.appendChild(
                noteHeading
            );

            lyricsStructure.appendChild(
                noteList
            );
        }
    }


    /* ==========================================
       Principal creators
    ========================================== */

    /**
     * 作品そのものに関わる
     * 主要制作者を生成する。
     *
     * 録音やアーカイブ管理などの役割は、
     * Contributorsページまたは
     * 各音源の制作情報で扱う。
     */
    function renderPrincipalCreators(
        metadata
    ) {
        const contributors =
            asArray(
                metadata.work
                    ?.contributors
            );

        const principalRoles =
            new Set([
                "lyricist",
                "composer",
                "arranger",
                "choreographer"
            ]);

        const principalContributors =
            contributors.filter(
                (contributor) =>
                    principalRoles.has(
                        contributor.role
                    )
            );

        const groupedCreators =
            groupPeopleByName(
                principalContributors
            );

        const creatorList =
            document.createElement(
                "dl"
            );


        groupedCreators.forEach(
            (creator) => {
                const nameElement =
                    createTextElement(
                        "dt",

                        formatBilingualName(
                            creator
                        )
                    );

                const rolesElement =
                    createTextElement(
                        "dd",

                        creator.roles.join(
                            "／"
                        )
                    );

                creatorList.appendChild(
                    nameElement
                );

                creatorList.appendChild(
                    rolesElement
                );
            }
        );


        principalCreators.appendChild(
            creatorList
        );
    }


    /* ==========================================
       Performance helpers
    ========================================== */

    /**
     * 演奏・歌唱担当者の一覧を生成する。
     */
    function createPerformerList(
        performers
    ) {
        const performerList =
            document.createElement("ul");


        performers.forEach(
            (performer) => {
                const roleLabel =
                    getRoleLabel(
                        performer.role
                    );

                let performerText =
                    `${roleLabel}：` +
                    formatBilingualName(
                        performer
                    );


                if (
                    hasValue(
                        performer.note
                    ) &&
                    performer.note !==
                        roleLabel
                ) {
                    performerText +=
                        `（${performer.note}）`;
                }


                performerList.appendChild(
                    createTextElement(
                        "li",
                        performerText
                    )
                );
            }
        );


        return performerList;
    }


    /**
     * 録音・音楽編集など、
     * 体現形を成立させた制作担当者の
     * 一覧を生成する。
     */
    function createManifestationCreditList(
        credits
    ) {
        const creditList =
            document.createElement("ul");


        credits.forEach(
            (credit) => {
                const roleLabel =
                    getRoleLabel(
                        credit.role
                    );

                let creditText =
                    `${roleLabel}：` +
                    formatBilingualName(
                        credit
                    );


                if (
                    hasValue(credit.note) &&
                    credit.note !==
                        roleLabel
                ) {
                    /*
                        YAMLのnoteが
                        「音楽録音」
                        「音楽編集」
                        のように役割名とほぼ同義の場合は、
                        冗長な重複表示を避ける。
                    */
                    const normalizedRole =
                        roleLabel.replace(
                            /\s/g,
                            ""
                        );

                    const normalizedNote =
                        String(
                            credit.note
                        ).replace(
                            /\s/g,
                            ""
                        );

                    if (
                        normalizedRole !==
                            normalizedNote &&
                        !normalizedNote.includes(
                            normalizedRole
                        )
                    ) {
                        creditText +=
                            `（${credit.note}）`;
                    }
                }


                creditList.appendChild(
                    createTextElement(
                        "li",
                        creditText
                    )
                );
            }
        );


        return creditList;
    }


    /**
     * 音源の公開日を取得する。
     *
     * まず各体現形のpublication_dateを参照し、
     * 存在しない場合は作品全体の公開日を使用する。
     */
    function getPerformancePublicationDate(
        performance,
        metadata
    ) {
        const manifestation =
            performance.manifestation ||
            {};

        const workPublication =
            metadata.work
                ?.publication ||
            {};

        return (
            manifestation
                .publication_date ||
            workPublication.date ||
            ""
        );
    }


    /**
     * 音源見出しを生成する。
     *
     * 例：
     * 塙亜樹 独唱版
     * 2026年7月26日公開
     */
    function createPerformanceHeading(
        performance,
        metadata
    ) {
        const headingWrapper =
            document.createElement(
                "div"
            );

        headingWrapper.className =
            "performance-heading";


        const title =
            createTextElement(
                "h3",

                performance.version_title ||
                "公式音源"
            );

        headingWrapper.appendChild(
            title
        );


        const publicationDate =
            getPerformancePublicationDate(
                performance,
                metadata
            );


        if (
            hasValue(publicationDate)
        ) {
            const publicationText =
                createTextElement(
                    "p",

                    `${formatJapaneseDate(
                        publicationDate
                    )}公開`,

                    "performance-publication-date"
                );

            headingWrapper.appendChild(
                publicationText
            );
        }


        return headingWrapper;
    }


    /**
     * 音源ファイルへのリンクを生成する。
     *
     * item.filesに公開ファイルがある場合のみ
     * 表示する。
     */
    function createAudioFileLinks(
        performance
    ) {
        const files =
            asArray(
                performance.item?.files
            );

        if (files.length === 0) {
            return null;
        }


        const linkContainer =
            document.createElement(
                "div"
            );

        linkContainer.className =
            "performance-files";


        const heading =
            createTextElement(
                "h4",
                "公開音源"
            );

        const fileList =
            document.createElement(
                "ul"
            );


        files.forEach(
            (file) => {
                if (
                    !hasValue(
                        file.file_name
                    )
                ) {
                    return;
                }

                const fileItem =
                    document.createElement(
                        "li"
                    );

                const fileLink =
                    createTextElement(
                        "a",

                        file.format
                            ? `${String(
                                file.format
                            ).toUpperCase()}音源`
                            : "音源ファイル"
                    );

                fileLink.href =
                    `../${file.file_name}`;

                fileLink.setAttribute(
                    "download",
                    ""
                );


                fileItem.appendChild(
                    fileLink
                );


                if (
                    hasValue(file.note)
                ) {
                    fileItem.appendChild(
                        document.createTextNode(
                            ` — ${file.note}`
                        )
                    );
                }


                fileList.appendChild(
                    fileItem
                );
            }
        );


        if (
            fileList.children.length ===
            0
        ) {
            return null;
        }


        linkContainer.appendChild(
            heading
        );

        linkContainer.appendChild(
            fileList
        );


        return linkContainer;
    }


    /* ==========================================
       Performances
    ========================================== */

    /**
     * 公開されている各演奏・歌唱版を生成する。
     *
     * YAML上のperformances配列を読み込み、
     * 音源数、演奏者、録音制作担当者、
     * 公開日を動的に表示する。
     */
    function renderPerformances(metadata) {
        const performances =
            asArray(
                metadata.performances
            );


        if (
            performances.length === 0
        ) {
            performancesContainer.appendChild(
                createTextElement(
                    "p",

                    "公開中の演奏情報はありません。"
                )
            );

            return;
        }


        const introduction =
            createTextElement(
                "p",

                `現在、次の` +
                `${formatCount(
                    performances.length,
                    "種類"
                )}` +
                `の公式音源が公開されています。`
            );

        performancesContainer.appendChild(
            introduction
        );


        performances.forEach(
            (performance) => {
                const performanceArticle =
                    document.createElement(
                        "article"
                    );

                performanceArticle.className =
                    "performance";


                const performanceHeading =
                    createPerformanceHeading(
                        performance,
                        metadata
                    );

                performanceArticle.appendChild(
                    performanceHeading
                );


                const performers =
                    asArray(
                        performance.performers
                    );


                if (
                    performers.length > 0
                ) {
                    const performerList =
                        createPerformerList(
                            performers
                        );

                    performanceArticle.appendChild(
                        performerList
                    );
                }


                const manifestation =
                    performance.manifestation ||
                    {};

                const credits =
                    asArray(
                        manifestation.credits
                    );


                if (
                    credits.length > 0
                ) {
                    const creditList =
                        createManifestationCreditList(
                            credits
                        );

                    performanceArticle.appendChild(
                        creditList
                    );
                }


                const audioFileLinks =
                    createAudioFileLinks(
                        performance
                    );


                if (audioFileLinks) {
                    performanceArticle.appendChild(
                        audioFileLinks
                    );
                }


                performancesContainer.appendChild(
                    performanceArticle
                );
            }
        );
    }


    /* ==========================================
       Publication and rights
    ========================================== */

    /**
     * 公開状況とライセンス情報を生成する。
     */
    function renderPublicationAndRights(
        metadata
    ) {
        const rights =
            metadata.rights || {};

        const license =
            rights.license || {};


        if (
            hasValue(
                license.name_ja
            ) &&
            hasValue(
                license.abbreviation
            )
        ) {
            const licenseParagraph =
                document.createElement(
                    "p"
                );

            licenseParagraph.appendChild(
                document.createTextNode(
                    "本作品は、"
                )
            );


            if (
                hasValue(
                    license.deed_url_ja
                )
            ) {
                const licenseLink =
                    createTextElement(
                        "a",

                        `${license.name_ja}` +
                        `（${license.abbreviation}）`
                    );

                licenseLink.href =
                    license.deed_url_ja;

                licenseLink.rel =
                    "license";

                licenseParagraph.appendChild(
                    licenseLink
                );

            } else {
                licenseParagraph.appendChild(
                    document.createTextNode(
                        `${license.name_ja}` +
                        `（${license.abbreviation}）`
                    )
                );
            }


            licenseParagraph.appendChild(
                document.createTextNode(
                    "で公開されています。"
                )
            );


            publicationAndRights.appendChild(
                licenseParagraph
            );
        }


        if (
            hasValue(rights.note)
        ) {
            publicationAndRights.appendChild(
                createTextElement(
                    "p",
                    rights.note
                )
            );
        }
    }


    /* ==========================================
       Source information
    ========================================== */

    /**
     * 表示内容の典拠となる資料を生成する。
     */
    function renderSourceInformation(
        metadata
    ) {
        const source =
            metadata.source || {};

        const bibliographicSource =
            source.bibliographic_source ||
            {};


        if (
            hasValue(
                bibliographicSource.title
            )
        ) {
            const sourceList =
                document.createElement(
                    "dl"
                );


            appendDefinition(
                sourceList,
                "資料名",
                bibliographicSource.title
            );

            appendDefinition(
                sourceList,
                "発行者",
                bibliographicSource.publisher
            );

            appendDefinition(
                sourceList,
                "発行日",
                formatJapaneseDate(
                    bibliographicSource.date
                )
            );


            sourceInformation.appendChild(
                sourceList
            );
        }


        if (
            hasValue(metadata.notes)
        ) {
            sourceInformation.appendChild(
                createTextElement(
                    "p",
                    metadata.notes
                )
            );
        }
    }


    /* ==========================================
       Page rendering
    ========================================== */

    /**
     * YAMLから変換されたメタデータを使用し、
     * ページ全体を生成する。
     */
    function renderPage(metadata) {
        renderWorkOverview(
            metadata
        );

        renderLyricsStructure(
            metadata
        );

        renderPrincipalCreators(
            metadata
        );

        renderPerformances(
            metadata
        );

        renderPublicationAndRights(
            metadata
        );

        renderSourceInformation(
            metadata
        );


        loadingMessage.hidden =
            true;

        aboutOndoContent.hidden =
            false;
    }


    /**
     * 読み込みエラー時の表示へ切り替える。
     */
    function showError(error) {
        console.error(
            "新荘音頭メタデータの読み込みに失敗しました。",
            error
        );

        loadingMessage.hidden =
            true;

        aboutOndoContent.hidden =
            true;

        errorMessage.hidden =
            false;
    }


    /* ==========================================
       Metadata loading
    ========================================== */

    /**
     * YAMLを取得し、
     * JavaScriptオブジェクトへ変換する。
     */
    async function loadMetadata() {
        try {
            const response =
                await fetch(
                    METADATA_URL
                );


            if (!response.ok) {
                throw new Error(
                    `HTTP error: ` +
                    `${response.status}`
                );
            }


            const yamlText =
                await response.text();


            const metadata =
                jsyaml.load(
                    yamlText
                );


            if (
                !metadata ||
                typeof metadata !==
                    "object"
            ) {
                throw new Error(
                    "YAMLをメタデータとして解釈できませんでした。"
                );
            }


            renderPage(
                metadata
            );

        } catch (error) {
            showError(
                error
            );
        }
    }


    /* ==========================================
       Initialization
    ========================================== */

    loadMetadata();
</script>

</body>
</html>
